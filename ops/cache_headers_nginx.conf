# Nginx cache headers для статики
# Подключить в Plesk: Домены → Хостинг → Настройки Apache и nginx
# Вставить в поле "Additional nginx directives"

# CSS/JS — 30 дней
location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Изображения — 90 дней
location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
    expires 90d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Шрифты — 1 год
location ~* \.(woff|woff2|ttf|eot|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# XML/JSON статика — 1 час
location ~* \.(xml|json)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# HTML — без кэширования (для деплоев)
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}
