# Nginx security rules
# Подключить в Plesk: Домены → Хостинг → Настройки Apache и nginx
# Вставить в поле "Additional nginx directives"

# Блокировка конфигурационных файлов
location ~ /\.env$ {
    deny all;
    return 404;
}

location ~ /wp-config\.php$ {
    deny all;
    return 404;
}

location ~ /\.htaccess$ {
    deny all;
    return 404;
}

# Блокировка .git директории
location ~ /\.git {
    deny all;
    return 404;
}

# Блокировка phpunit и composer файлов
location ~ /(phpunit|composer)\.(json|xml|lock|phar)$ {
    deny all;
    return 404;
}

location ~ /vendor/ {
    deny all;
    return 404;
}

# Блокировка cgi-bin
location ~ /cgi-bin/ {
    deny all;
    return 404;
}

# Блокировка бэкапов и временных файлов
location ~ \.(bak|old|orig|save|swp|tmp|sql|tar|gz|zip)$ {
    deny all;
    return 404;
}

# Блокировка доступа к node_modules
location ~ /node_modules/ {
    deny all;
    return 404;
}

# Блокировка скрытых файлов (кроме .well-known)
location ~ /\.(?!well-known) {
    deny all;
    return 404;
}

# X-Frame-Options для защиты от clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# XSS protection
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
