# Комбинированный nginx конфиг для Plesk
# Подключить в Plesk: Домены → Хостинг → Настройки Apache и nginx
# Вставить в поле "Additional nginx directives"
#
# Включает:
# - Cache headers для статики (CSS/JS/images/fonts)
# - Security rules (блокировка .env, .git, wp-config и т.д.)

# ===== REDIRECT www → non-www =====
# Редирект с www.androidchity.ru на androidchity.ru
if ($host = 'www.androidchity.ru') {
    return 301 https://androidchity.ru$request_uri;
}

# ===== SECURITY RULES =====

# Блокировка конфигурационных и секретных файлов
location ~ /\.(env|git|htaccess)$ {
    deny all;
    return 404;
}

location ~ /wp-config\.php$ {
    deny all;
    return 404;
}

location ~ /(phpunit|composer)\.(json|xml|lock|phar)$ {
    deny all;
    return 404;
}

location ~ /(vendor|node_modules|cgi-bin)/ {
    deny all;
    return 404;
}

location ~ \.(bak|old|orig|save|swp|tmp|sql|tar|gz|zip)$ {
    deny all;
    return 404;
}

# Блокировка скрытых файлов (кроме .well-known)
location ~ /\.(?!well-known) {
    deny all;
    return 404;
}

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ===== CACHE HEADERS =====

# CSS/JS — 30 дней
location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Изображения — 90 дней
location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
    expires 90d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Шрифты — 1 год
location ~* \.(woff|woff2|ttf|eot|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# XML/JSON — 1 час
location ~* \.(xml|json)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# HTML — без кэширования (для деплоев)
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}
