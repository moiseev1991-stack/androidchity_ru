 <script>

        (function () {
            var btns = document.querySelectorAll('a.download');

            btns.forEach(function (btn) {
                btn.addEventListener('click', function (e) {

                    var href = btn.getAttribute('href');
                    if (!href) {
                        return;
                    }
                    
                    e.preventDefault();

                    window.open(href,"_blank");
                    return false;
                });
            });
        }());
